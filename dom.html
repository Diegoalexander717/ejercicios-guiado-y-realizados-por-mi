<!DOCTYPE html>

<head>

        <h1>Ejercicio 4 document</h1>


       <p id="mensaje">Texto original</p>
    <button onclick="cambiarTexto()">Cambiar texto</button>

    <script>
        function cambiarTexto(){
            document.getElementById("mensaje").innerText = "Texto cambiado con JS"
        }
    </script>
